<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Animation HCTECH du fonctionnement d'une machine de récupération des vapeurs d'essence</title>
  <desc id="desc">Schéma animé montrant les vapeurs d'essence aspirées depuis la cuve, condensées dans la machine ECO-RENTABLE puis réinjectées sous forme liquide dans le réservoir.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6fbf8"/>
      <stop offset=".48" stop-color="#eef7f2"/>
      <stop offset="1" stop-color="#dbeee4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c8ded0"/>
      <stop offset="1" stop-color="#8db49b"/>
    </linearGradient>
    <linearGradient id="tank" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d6e7dd"/>
      <stop offset=".55" stop-color="#9fb9aa"/>
      <stop offset="1" stop-color="#6f897b"/>
    </linearGradient>
    <linearGradient id="fuel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f8c44f"/>
      <stop offset=".5" stop-color="#f39c12"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fffb"/>
      <stop offset=".52" stop-color="#e6f3ec"/>
      <stop offset="1" stop-color="#b8d7c5"/>
    </linearGradient>
    <linearGradient id="cooling" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dff5ff"/>
      <stop offset="1" stop-color="#66bfe7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0d1f17" flood-opacity=".16"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1a7a4a"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#f39c12"/>
    </marker>
    <path id="vaporPath" d="M470 548 C548 492 604 386 744 348 C818 328 914 327 1000 348"/>
    <path id="returnPath" d="M1020 554 C884 624 760 656 590 632 C532 624 486 604 438 578"/>
    <path id="coilPath" d="M1060 392 C1120 364 1200 364 1260 392 C1200 420 1120 420 1060 392 C1120 364 1200 364 1260 392 C1200 420 1120 420 1060 392"/>
    <style>
      * { box-sizing: border-box; }
      svg { background: #f6fbf8; font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: 0; }
      .title { fill: #0d1f17; font-size: 46px; font-weight: 850; }
      .subtitle { fill: #375044; font-size: 24px; font-weight: 500; }
      .label { fill: #1e2d26; font-size: 22px; font-weight: 750; }
      .small { fill: #4f685a; font-size: 16px; font-weight: 600; }
      .micro { fill: #5a7060; font-size: 13px; font-weight: 700; text-transform: uppercase; }
      .white { fill: #ffffff; }
      .pipe { fill: none; stroke: #1a7a4a; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .pipe-shadow { fill: none; stroke: rgba(13,31,23,.12); stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .vapor-line { fill: none; stroke: #f39c12; stroke-width: 7; stroke-dasharray: 18 18; stroke-linecap: round; opacity: .48; marker-end: url(#arrowAmber); animation: dashVapor 2.2s linear infinite; }
      .return-line { fill: none; stroke: #1a7a4a; stroke-width: 7; stroke-dasharray: 20 18; stroke-linecap: round; opacity: .58; marker-end: url(#arrowGreen); animation: dashReturn 2.4s linear infinite; }
      .steam { fill: #f39c12; opacity: .68; filter: url(#glow); }
      .fuel-dot { fill: #2ecc71; filter: url(#glow); }
      .pulse { transform-origin: center; animation: pulse 1.8s ease-in-out infinite; }
      .fan { transform-origin: 1128px 486px; animation: spin 2.2s linear infinite; }
      .cool { animation: coolPulse 2.8s ease-in-out infinite; }
      .liters { animation: litersBlink 4s ease-in-out infinite; }
      .gauge-needle { transform-origin: 756px 255px; animation: needle 5.8s ease-in-out infinite; }
      .step { animation: stepPulse 12s ease-in-out infinite; }
      .step.one { animation-delay: 0s; }
      .step.two { animation-delay: 2s; }
      .step.three { animation-delay: 4s; }
      .step.four { animation-delay: 6s; }
      .step.five { animation-delay: 8s; }
      .step.six { animation-delay: 10s; }
      .bubble { animation: bubbleRise 5.5s ease-in-out infinite; }
      .bubble.b2 { animation-delay: .9s; }
      .bubble.b3 { animation-delay: 1.8s; }
      .bubble.b4 { animation-delay: 2.8s; }
      .bubble.b5 { animation-delay: 3.6s; }
      @keyframes dashVapor { to { stroke-dashoffset: -72; } }
      @keyframes dashReturn { to { stroke-dashoffset: -76; } }
      @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.78); } 45% { opacity: .95; transform: scale(1.08); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes coolPulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes litersBlink { 0%,100% { fill: #1a7a4a; } 50% { fill: #2ecc71; } }
      @keyframes needle { 0%,15% { transform: rotate(-24deg); } 35%,70% { transform: rotate(34deg); } 90%,100% { transform: rotate(-12deg); } }
      @keyframes stepPulse {
        0%, 13%, 100% { opacity: .56; transform: translateY(0); }
        5%, 9% { opacity: 1; transform: translateY(-5px); }
      }
      @keyframes bubbleRise {
        0% { opacity: 0; transform: translateY(20px) scale(.72); }
        18% { opacity: .72; }
        60% { opacity: .55; }
        100% { opacity: 0; transform: translateY(-78px) scale(1.18); }
      }
      @media (prefers-reduced-motion: reduce) {
        .vapor-line, .return-line, .pulse, .fan, .cool, .liters, .gauge-needle, .step, .bubble { animation: none; }
      }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 616 C190 568 338 622 520 590 C790 544 1028 560 1268 603 C1406 628 1508 628 1600 596 L1600 900 L0 900 Z" fill="url(#ground)"/>
  <path d="M0 690 L1600 690 L1600 900 L0 900 Z" fill="#6e927a" opacity=".18"/>

  <g transform="translate(84 56)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">ECO-RENTABLE : vapeurs en carburant</text>
    <text class="subtitle" x="0" y="62">Circuit ferme installe sur les events de cuve : aspiration, condensation, retour au reservoir.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1180" y="54" width="314" height="118" rx="22" fill="#ffffff" opacity=".94"/>
    <text class="micro" x="1210" y="92">Impact station</text>
    <text class="label liters" x="1210" y="127">3 a 7 L / 1000 L</text>
    <text class="small" x="1210" y="154">recuperes au lieu d'etre rejetes</text>
  </g>

  <g id="forecourt" filter="url(#softShadow)">
    <rect x="164" y="344" width="266" height="232" rx="24" fill="#ffffff"/>
    <rect x="196" y="384" width="88" height="148" rx="12" fill="#143d26"/>
    <rect x="212" y="404" width="56" height="38" rx="6" fill="#2ecc71" opacity=".9"/>
    <rect x="212" y="458" width="56" height="54" rx="7" fill="#edf7f1"/>
    <path d="M284 426 C360 425 378 469 392 516" fill="none" stroke="#182c22" stroke-width="8" stroke-linecap="round"/>
    <rect x="354" y="506" width="66" height="40" rx="10" fill="#1a7a4a"/>
    <rect x="88" y="484" width="78" height="56" rx="12" fill="#20343b"/>
    <path d="M166 496 L206 496 L206 540 L166 540 Z" fill="#20343b"/>
    <rect x="104" y="498" width="34" height="24" rx="5" fill="#cfe7f1"/>
    <rect x="198" y="478" width="196" height="68" rx="34" fill="#edf7f1" stroke="#1a7a4a" stroke-width="5"/>
    <path d="M224 490 L362 490" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".75"/>
    <rect x="252" y="508" width="88" height="22" rx="11" fill="#f39c12" opacity=".92"/>
    <text x="296" y="524" text-anchor="middle" fill="#0d1f17" font-size="13" font-weight="850">ESSENCE</text>
    <rect x="82" y="538" width="338" height="26" rx="8" fill="#273b44"/>
    <path d="M394 514 C426 514 438 532 438 548" fill="none" stroke="#182c22" stroke-width="8" stroke-linecap="round"/>
    <circle cx="136" cy="568" r="26" fill="#111a1d"/>
    <circle cx="248" cy="568" r="26" fill="#111a1d"/>
    <circle cx="366" cy="568" r="26" fill="#111a1d"/>
    <circle cx="136" cy="568" r="11" fill="#95a7ae"/>
    <circle cx="248" cy="568" r="11" fill="#95a7ae"/>
    <circle cx="366" cy="568" r="11" fill="#95a7ae"/>
    <text class="small" x="198" y="330">Ravitaillement</text>
  </g>

  <g id="tank" filter="url(#softShadow)">
    <rect x="258" y="616" width="510" height="146" rx="73" fill="url(#tank)"/>
    <clipPath id="tankClip">
      <rect x="258" y="616" width="510" height="146" rx="73"/>
    </clipPath>
    <g clip-path="url(#tankClip)">
      <rect x="258" y="684" width="510" height="78" fill="url(#fuel)"/>
      <path d="M258 685 C322 662 388 705 454 684 C522 662 594 705 660 684 C706 670 740 677 768 686 L768 762 L258 762 Z" fill="#ffcf66" opacity=".48"/>
      <circle class="bubble" cx="374" cy="674" r="9" fill="#fff4c2" opacity=".55"/>
      <circle class="bubble b2" cx="438" cy="688" r="7" fill="#fff4c2" opacity=".5"/>
      <circle class="bubble b3" cx="540" cy="672" r="11" fill="#fff4c2" opacity=".45"/>
      <circle class="bubble b4" cx="618" cy="690" r="8" fill="#fff4c2" opacity=".48"/>
      <circle class="bubble b5" cx="688" cy="672" r="6" fill="#fff4c2" opacity=".5"/>
    </g>
    <rect x="320" y="584" width="78" height="44" rx="12" fill="#759281"/>
    <rect x="584" y="584" width="78" height="44" rx="12" fill="#759281"/>
    <text class="small" x="365" y="796" text-anchor="middle">Cuve essence</text>
    <text class="small" x="664" y="796" text-anchor="middle">Retour liquide</text>
  </g>

  <g id="vents">
    <path class="pipe-shadow" d="M620 586 L620 386 C620 340 658 300 704 300 L756 300"/>
    <path class="pipe" d="M620 586 L620 386 C620 340 658 300 704 300 L756 300"/>
    <path class="pipe-shadow" d="M756 300 L1002 300"/>
    <path class="pipe" d="M756 300 L1002 300"/>
    <path class="pipe-shadow" d="M1010 540 C880 620 700 650 512 618 C470 610 438 594 405 576"/>
    <path class="pipe" d="M1010 540 C880 620 700 650 512 618 C470 610 438 594 405 576"/>
    <path class="vapor-line" d="M470 548 C548 492 604 386 744 348 C818 328 914 327 1000 348"/>
    <path class="return-line" d="M1020 554 C884 624 760 656 590 632 C532 624 486 604 438 578"/>
  </g>

  <g id="sensor" filter="url(#softShadow)">
    <circle cx="756" cy="300" r="58" fill="#ffffff"/>
    <circle cx="756" cy="300" r="42" fill="#edf7f1"/>
    <path d="M728 304 A29 29 0 0 1 784 304" fill="none" stroke="#1a7a4a" stroke-width="7" stroke-linecap="round"/>
    <line class="gauge-needle" x1="756" y1="300" x2="780" y2="277" stroke="#e74c3c" stroke-width="7" stroke-linecap="round"/>
    <circle cx="756" cy="300" r="6" fill="#0d1f17"/>
    <circle class="pulse" cx="756" cy="300" r="72" fill="none" stroke="#2ecc71" stroke-width="5"/>
    <text class="small" x="756" y="384" text-anchor="middle">Capteur pression</text>
  </g>

  <g id="machineBox" filter="url(#softShadow)">
    <rect x="982" y="300" width="360" height="292" rx="30" fill="url(#machine)" stroke="#1a7a4a" stroke-width="4"/>
    <rect x="1018" y="332" width="292" height="58" rx="14" fill="#0d1f17"/>
    <text x="1044" y="368" fill="#2ecc71" font-size="27" font-weight="850">ECO-RENTABLE</text>
    <rect x="1030" y="420" width="146" height="116" rx="18" fill="#ffffff" stroke="#c9e4d3" stroke-width="3"/>
    <rect class="cool" x="1194" y="420" width="104" height="116" rx="18" fill="url(#cooling)" stroke="#2d97c9" stroke-width="3"/>
    <path class="cool" d="M1218 452 L1274 504 M1274 452 L1218 504 M1246 440 L1246 516 M1208 478 L1284 478" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity=".85"/>
    <circle cx="1128" cy="486" r="44" fill="#e8f7ef" stroke="#1a7a4a" stroke-width="4"/>
    <g class="fan">
      <path d="M1128 486 C1120 454 1140 445 1154 461 C1140 468 1134 475 1128 486Z" fill="#1a7a4a"/>
      <path d="M1128 486 C1160 478 1169 498 1153 512 C1146 498 1139 492 1128 486Z" fill="#1a7a4a"/>
      <path d="M1128 486 C1136 518 1116 527 1102 511 C1116 504 1122 497 1128 486Z" fill="#1a7a4a"/>
      <path d="M1128 486 C1096 494 1087 474 1103 460 C1110 474 1117 480 1128 486Z" fill="#1a7a4a"/>
    </g>
    <circle cx="1128" cy="486" r="9" fill="#0d1f17"/>
    <path d="M1062 563 L1288 563" stroke="#9fc9af" stroke-width="8" stroke-linecap="round"/>
    <circle cx="1062" cy="563" r="8" fill="#f39c12"/>
    <circle cx="1288" cy="563" r="8" fill="#2ecc71"/>
    <text class="small" x="1110" y="554" text-anchor="middle">Condenseur</text>
    <text class="small" x="1246" y="554" text-anchor="middle">Froid</text>
  </g>

  <g id="dash" filter="url(#softShadow)">
    <rect x="1176" y="624" width="266" height="132" rx="22" fill="#ffffff"/>
    <text class="micro" x="1204" y="656">Application connectee</text>
    <text class="label" x="1204" y="692">+60 L / jour</text>
    <text class="small" x="1204" y="722">mesures, pression, historique</text>
    <rect x="1204" y="736" width="202" height="10" rx="5" fill="#e5efe9"/>
    <rect x="1204" y="736" width="146" height="10" rx="5" fill="#2ecc71">
      <animate attributeName="width" values="52;172;146;198;146" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="particles">
    <circle class="steam" r="7">
      <animateMotion dur="5.8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#vaporPath" xlink:href="#vaporPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.9;.9;0" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="steam" r="5">
      <animateMotion dur="5.8s" begin="1.15s" repeatCount="indefinite" rotate="auto">
        <mpath href="#vaporPath" xlink:href="#vaporPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.8;.8;0" dur="5.8s" begin="1.15s" repeatCount="indefinite"/>
    </circle>
    <circle class="steam" r="9">
      <animateMotion dur="5.8s" begin="2.35s" repeatCount="indefinite" rotate="auto">
        <mpath href="#vaporPath" xlink:href="#vaporPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.75;.75;0" dur="5.8s" begin="2.35s" repeatCount="indefinite"/>
    </circle>
    <circle class="steam" r="6">
      <animateMotion dur="5.8s" begin="3.5s" repeatCount="indefinite" rotate="auto">
        <mpath href="#vaporPath" xlink:href="#vaporPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.82;.82;0" dur="5.8s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="fuel-dot" r="8">
      <animateMotion dur="5.6s" begin=".7s" repeatCount="indefinite" rotate="auto">
        <mpath href="#returnPath" xlink:href="#returnPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.95;.95;0" dur="5.6s" begin=".7s" repeatCount="indefinite"/>
    </circle>
    <circle class="fuel-dot" r="6">
      <animateMotion dur="5.6s" begin="2.1s" repeatCount="indefinite" rotate="auto">
        <mpath href="#returnPath" xlink:href="#returnPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.9;.9;0" dur="5.6s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="fuel-dot" r="10">
      <animateMotion dur="5.6s" begin="3.6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#returnPath" xlink:href="#returnPath"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;.9;.9;0" dur="5.6s" begin="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="callouts">
    <rect x="74" y="642" width="236" height="72" rx="18" fill="#ffffff" opacity=".94" filter="url(#softShadow)"/>
    <text class="micro" x="100" y="670">Probleme</text>
    <text class="small" x="100" y="696">les vapeurs sortiraient par l'event</text>
    <path d="M298 654 C374 604 420 570 470 548" fill="none" stroke="#f39c12" stroke-width="4" stroke-dasharray="8 8"/>

    <rect x="1328" y="316" width="202" height="88" rx="18" fill="#ffffff" opacity=".94" filter="url(#softShadow)"/>
    <text class="micro" x="1354" y="346">Resultat</text>
    <text class="small" x="1354" y="374">moins de COV</text>
    <text class="small" x="1354" y="397">plus de carburant vendable</text>
  </g>

  <g id="steps" transform="translate(84 812)">
    <g class="step one">
      <rect width="204" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#f39c12"/>
      <text x="28" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="850">1</text>
      <text class="small" x="56" y="32">Vapeurs en cuve</text>
    </g>
    <g class="step two" transform="translate(226 0)">
      <rect width="204" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#1a7a4a"/>
      <text x="28" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="850">2</text>
      <text class="small" x="56" y="32">Seuil detecte</text>
    </g>
    <g class="step three" transform="translate(452 0)">
      <rect width="204" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#1a7a4a"/>
      <text x="28" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="850">3</text>
      <text class="small" x="56" y="32">Aspiration</text>
    </g>
    <g class="step four" transform="translate(678 0)">
      <rect width="204" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#2980b9"/>
      <text x="28" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="850">4</text>
      <text class="small" x="56" y="32">Condensation</text>
    </g>
    <g class="step five" transform="translate(904 0)">
      <rect width="204" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#2ecc71"/>
      <text x="28" y="32" text-anchor="middle" fill="#0d1f17" font-size="18" font-weight="850">5</text>
      <text class="small" x="56" y="32">Retour liquide</text>
    </g>
    <g class="step six" transform="translate(1130 0)">
      <rect width="260" height="52" rx="16" fill="#ffffff"/>
      <circle cx="28" cy="26" r="16" fill="#0d1f17"/>
      <text x="28" y="32" text-anchor="middle" fill="#fff" font-size="18" font-weight="850">6</text>
      <text class="small" x="56" y="32">Suivi transparent des volumes</text>
    </g>
  </g>
</svg>
